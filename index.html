<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

  body {
    background: #000;
    color: #ff0000;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    position: relative;
  }

  .cursor {
    position: fixed;
    width: 24px;
    height: 24px;
    border: 2px solid #ff0000;
    border-radius: 50%;
    pointer-events: none;
    z-index: 99999;
    mix-blend-mode: difference;
    animation: cursor-pulse 0.5s ease-in-out infinite;
  }

  @keyframes cursor-pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 10px red; }
    50% { transform: scale(1.3); box-shadow: 0 0 20px red, 0 0 40px darkred; }
  }

  .cursor-trail {
    position: fixed;
    width: 6px;
    height: 6px;
    background: red;
    border-radius: 50%;
    pointer-events: none;
    z-index: 99998;
    box-shadow: 0 0 6px red;
  }

  .scanlines {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.2) 0px,
      rgba(0,0,0,0.2) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
    z-index: 1000;
    animation: scanline-scroll 0.1s linear infinite;
  }

  @keyframes scanline-scroll {
    0% { transform: translateY(0); }
    100% { transform: translateY(3px); }
  }

  .noise-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
    opacity: 0.12;
    animation: noise-anim 0.15s steps(3) infinite;
  }

  @keyframes noise-anim {
    0% { transform: translate(0, 0); filter: hue-rotate(0deg); }
    33% { transform: translate(-10px, 5px); filter: hue-rotate(90deg); }
    66% { transform: translate(5px, -10px); filter: hue-rotate(180deg); }
    100% { transform: translate(-5px, 10px); filter: hue-rotate(270deg); }
  }

  .vhs-tracking {
    position: fixed;
    left: 0;
    width: 100%;
    height: 8px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), rgba(255,0,0,0.3), rgba(255,255,255,0.1), transparent);
    z-index: 998;
    pointer-events: none;
    animation: vhs-track 3s linear infinite;
  }

  @keyframes vhs-track {
    0% { top: -10px; }
    100% { top: 100vh; }
  }

  .chromatic-aberration {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 997;
    mix-blend-mode: screen;
    opacity: 0.3;
    animation: chromatic-shift 4s ease-in-out infinite;
  }

  @keyframes chromatic-shift {
    0%, 100% { transform: translate(0); }
    25% { transform: translate(-3px, 2px); }
    50% { transform: translate(3px, -2px); }
    75% { transform: translate(-2px, -3px); }
  }

  .center-message {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 2.5rem;
    text-align: center;
    z-index: 500;
    text-shadow: 3px 0 #00ffff, -3px 0 #ff00ff, 0 0 20px red;
    animation: center-glitch 2s infinite, text-flicker 0.1s infinite;
    user-select: none;
    max-width: 80%;
  }

  @keyframes center-glitch {
    0%, 88%, 100% { transform: translate(-50%, -50%) skew(0deg); filter: none; }
    89% { transform: translate(-45%, -55%) skew(-10deg); filter: hue-rotate(90deg); }
    90% { transform: translate(-55%, -45%) skew(10deg); filter: invert(1); }
    91% { transform: translate(-50%, -50%) skew(0deg); filter: none; }
    92% { transform: translate(-48%, -52%) skew(-5deg); }
    93% { transform: translate(-50%, -50%) skew(0deg); }
  }

  @keyframes text-flicker {
    0%, 93%, 100% { opacity: 1; }
    94% { opacity: 0.3; }
    95% { opacity: 1; }
    96% { opacity: 0.1; }
    97% { opacity: 1; }
  }

  .floating-msg {
    position: absolute;
    font-size: 1rem;
    pointer-events: none;
    z-index: 400;
    text-shadow: 0 0 8px currentColor;
    animation: float-ghost 5s ease-in-out forwards;
    user-select: none;
  }

  @keyframes float-ghost {
    0% { opacity: 0; transform: translateY(30px) scale(0.7); }
    15% { opacity: 0.9; }
    50% { opacity: 0.6; transform: translateY(-20px) scale(1.1); }
    85% { opacity: 0.3; }
    100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
  }

  .eye-container {
    position: absolute;
    z-index: 450;
    pointer-events: none;
  }

  .eye-outer {
    width: 70px;
    height: 70px;
    background: radial-gradient(ellipse, #f5f5dc 40%, #ddd 60%, #bbb 100%);
    clip-path: ellipse(50% 38% at 50% 50%);
    position: relative;
    box-shadow: inset 0 0 20px rgba(139,0,0,0.5), 0 0 15px rgba(255,0,0,0.3);
  }

  .eye-iris {
    position: absolute;
    width: 30px;
    height: 30px;
    background: radial-gradient(circle, #8b0000 30%, #ff0000 60%, #5c0000 100%);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    transition: all 0.08s ease-out;
  }

  .eye-pupil {
    position: absolute;
    width: 14px;
    height: 14px;
    background: #000;
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    transition: all 0.08s ease-out;
  }

  .eye-pupil::after {
    content: '';
    position: absolute;
    width: 4px;
    height: 4px;
    background: rgba(255,255,255,0.6);
    border-radius: 50%;
    top: 3px;
    right: 3px;
  }

  .blood-drip {
    position: fixed;
    top: 0;
    width: 6px;
    background: linear-gradient(to bottom, #5c0000, #8b0000, #ff0000, transparent);
    border-radius: 0 0 50% 50%;
    z-index: 700;
    pointer-events: none;
    animation: drip-down 5s ease-in forwards;
  }

  @keyframes drip-down {
    0% { height: 0; opacity: 1; }
    60% { height: 180px; opacity: 0.9; }
    100% { height: 250px; opacity: 0; }
  }

  .static-bar {
    position: fixed;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,0,0,0.9), rgba(255,255,255,0.5), rgba(255,0,0,0.9), transparent);
    z-index: 990;
    pointer-events: none;
    animation: bar-sweep 1.5s linear infinite;
  }

  @keyframes bar-sweep {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(200vw); }
  }

  .whisper {
    position: fixed;
    font-size: 0.65rem;
    color: rgba(255, 0, 0, 0.25);
    pointer-events: none;
    z-index: 300;
    animation: whisper-ghost 7s ease-in-out forwards;
    font-style: italic;
  }

  @keyframes whisper-ghost {
    0%, 100% { opacity: 0; filter: blur(3px); }
    30%, 70% { opacity: 0.6; filter: blur(0px); }
  }

  .spinning-symbol {
    position: absolute;
    font-size: 1.5rem;
    color: rgba(255, 0, 0, 0.15);
    animation: symbol-spin 8s linear infinite;
    pointer-events: none;
    z-index: 100;
  }

  @keyframes symbol-spin {
    0% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(180deg) scale(1.5); }
    100% { transform: rotate(360deg) scale(1); }
  }

  .ascii-face {
    position: fixed;
    font-family: monospace;
    font-size: 0.55rem;
    line-height: 0.55rem;
    color: rgba(255, 0, 0, 0.5);
    white-space: pre;
    pointer-events: none;
    z-index: 550;
    opacity: 0;
    animation: face-flash 8s ease-in-out forwards;
  }

  @keyframes face-flash {
    0%, 80%, 100% { opacity: 0; }
    85%, 95% { opacity: 0.2; }
  }

  .red-pulse-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(circle at center, rgba(139,0,0,0.4), transparent 70%);
    pointer-events: none;
    z-index: 850;
    opacity: 0;
    animation: red-breathe 4s ease-in-out infinite;
  }

  @keyframes red-breathe {
    0%, 100% { opacity: 0; }
    50% { opacity: 0.4; }
  }

  .scream-flash {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none !important;
    z-index: 2000;
    opacity: 0;
    transition: opacity 0.03s;
  }

  .countdown {
    position: fixed;
    bottom: 15px;
    right: 15px;
    font-size: 0.75rem;
    color: rgba(255, 0, 0, 0.6);
    z-index: 600;
    font-family: monospace;
    text-shadow: 0 0 10px red;
  }

  .hacking-screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #000;
    z-index: 5000;
    display: none;
    flex-direction: column;
    padding: 20px;
    font-family: monospace;
    font-size: 0.8rem;
    color: #0f0;
    overflow: hidden;
  }

  .hacking-screen.active {
    display: flex;
  }

  .hacking-text {
    margin: 2px 0;
    opacity: 0.9;
  }

  .hacking-text.red { color: #ff0000; }
  .hacking-text.yellow { color: #ffff00; }
  .hacking-text.white { color: #ffffff; }

  .webcam-fake {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 320px;
    height: 240px;
    background: #111;
    border: 2px solid #ff0000;
    z-index: 5001;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 50px rgba(255,0,0,0.5);
  }

  .webcam-fake.active { display: flex; }

  .webcam-fake .rec-dot {
    width: 12px;
    height: 12px;
    background: red;
    border-radius: 50%;
    animation: rec-blink 0.5s infinite;
    position: absolute;
    top: 10px;
    right: 10px;
  }

  @keyframes rec-blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .webcam-fake .webcam-text {
    color: #ff0000;
    font-size: 0.9rem;
    margin-top: 10px;
    text-shadow: 0 0 10px red;
  }

  .webcam-fake .static-bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0.3;
    background-image: repeating-radial-gradient(circle, #333 0px, #000 2px, #222 4px);
    animation: webcam-static 0.2s steps(5) infinite;
  }

  @keyframes webcam-static {
    0% { transform: scale(1) translate(0); }
    25% { transform: scale(1.05) translate(-5px, 3px); }
    50% { transform: scale(1) translate(5px, -3px); }
    75% { transform: scale(1.05) translate(-3px, -5px); }
  }

  .ghost-face {
    position: fixed;
    z-index: 3000;
    pointer-events: none;
    opacity: 0;
    font-size: 15rem;
    color: rgba(255, 0, 0, 0.8);
    text-shadow: 0 0 50px red, 0 0 100px darkred;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  .ghost-face.flash {
    animation: ghost-appear 0.3s ease-out forwards;
  }

  @keyframes ghost-appear {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
    30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    60% { opacity: 0.8; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
  }

  .bsod {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #0078d7;
    z-index: 10000;
    display: none;
    flex-direction: column;
    padding: 10%;
    color: white;
    font-family: 'Segoe UI', sans-serif;
  }

  .bsod.active { display: flex; }

  .bsod .sad { font-size: 8rem; margin-bottom: 20px; }
  .bsod .msg { font-size: 1.5rem; margin-bottom: 10px; }
  .bsod .detail { font-size: 0.9rem; opacity: 0.8; }
  .bsod .percent { font-size: 1.2rem; margin-top: 30px; }

  .mirror-text {
    position: absolute;
    font-size: 0.8rem;
    color: rgba(255, 255, 255, 0.08);
    transform: scaleX(-1);
    pointer-events: none;
    z-index: 150;
  }

  .inverse-outline {
    position: fixed;
    font-size: 4rem;
    color: transparent;
    -webkit-text-stroke: 1px rgba(255, 0, 0, 0.08);
    pointer-events: none;
    z-index: 50;
    user-select: none;
  }

  .glitch-block {
    position: fixed;
    pointer-events: none;
    z-index: 950;
    mix-blend-mode: screen;
  }

  .typing-text {
    position: fixed;
    font-size: 1.2rem;
    color: #ff0000;
    z-index: 600;
    pointer-events: none;
    text-shadow: 0 0 10px red;
  }

  .cursor-blink {
    animation: blink 0.5s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .distortion-wave {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 800;
    opacity: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent 0px,
      rgba(255, 0, 0, 0.05) 2px,
      transparent 4px
    );
    animation: wave-distort 3s ease-in-out infinite;
  }

  @keyframes wave-distort {
    0%, 100% { opacity: 0; transform: translateX(0); }
    50% { opacity: 0.5; transform: translateX(10px); }
  }

  .hand {
    position: fixed;
    font-size: 5rem;
    z-index: 700;
    pointer-events: none;
    opacity: 0;
    animation: hand-reach 6s ease-in-out forwards;
  }

  @keyframes hand-reach {
    0%, 70%, 100% { opacity: 0; transform: translateY(100vh) rotate(0deg); }
    75% { opacity: 0.6; transform: translateY(50vh) rotate(-10deg); }
    85% { opacity: 0.8; transform: translateY(30vh) rotate(5deg); }
    95% { opacity: 0.4; transform: translateY(20vh) rotate(-5deg); }
  }

  .warning-box {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: #1a0000;
    border: 3px solid #ff0000;
    padding: 30px;
    z-index: 999999;
    display: none;
    flex-direction: column;
    align-items: center;
    box-shadow: 0 0 100px rgba(255,0,0,0.8);
    max-width: 400px;
    text-align: center;
    pointer-events: auto !important;
  }

  .warning-box.active { display: flex !important; }

  .warning-box .warn-title {
    font-size: 1.5rem;
    color: #ff0000;
    margin-bottom: 15px;
    text-shadow: 0 0 10px red;
    pointer-events: auto;
  }

  .warning-box .warn-msg {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.8);
    margin-bottom: 20px;
    line-height: 1.5;
    pointer-events: auto;
  }

  .warning-box .warn-btn {
    background: #ff0000;
    color: #000;
    border: none;
    padding: 12px 35px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer !important;
    font-family: monospace;
    pointer-events: auto !important;
    z-index: 9999999 !important;
    position: relative;
  }

  .warning-box .warn-btn:hover {
    background: #8b0000;
    color: #fff;
  }

  .reverse-text {
    position: fixed;
    font-size: 1rem;
    color: rgba(255, 0, 0, 0.15);
    pointer-events: none;
    z-index: 200;
    unicode-bidi: bidi-override;
    direction: rtl;
  }

  .intense-mode body {
    animation: body-shake 0.1s infinite;
  }

  @keyframes body-shake {
    0% { transform: translate(0); filter: none; }
    25% { transform: translate(-3px, 2px); filter: hue-rotate(45deg); }
    50% { transform: translate(3px, -2px); filter: saturate(2); }
    75% { transform: translate(-2px, -3px); filter: invert(0.1); }
    100% { transform: translate(0); filter: none; }
  }

  .tear-line {
    position: fixed;
    left: 0;
    width: 100%;
    height: 1px;
    background: rgba(255, 0, 0, 0.6);
    z-index: 960;
    pointer-events: none;
    animation: tear-move 0.5s linear infinite;
  }

  @keyframes tear-move {
    0% { transform: translateY(-100vh); }
    100% { transform: translateY(100vh); }
  }

  .subliminal {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8rem;
    color: rgba(255, 0, 0, 0.9);
    z-index: 2500;
    pointer-events: none;
    opacity: 0;
  }

  .subliminal.flash {
    animation: subliminal-flash 0.08s ease-out;
  }

  @keyframes subliminal-flash {
    0% { opacity: 0; }
    50% { opacity: 1; }
    100% { opacity: 0; }
  }

  .corruption {
    position: fixed;
    pointer-events: none;
    z-index: 900;
    background: repeating-linear-gradient(
      0deg,
      rgba(255,0,0,0.3) 0px,
      rgba(0,255,0,0.2) 2px,
      rgba(0,0,255,0.3) 4px,
      rgba(255,0,0,0.1) 6px
    );
    animation: corrupt-shift 0.1s steps(3) infinite;
  }

  @keyframes corrupt-shift {
    0% { transform: translate(0) skew(0deg); }
    33% { transform: translate(-5px, 3px) skew(2deg); }
    66% { transform: translate(5px, -3px) skew(-2deg); }
  }

  .heartbeat-text {
    animation: heartbeat 1.2s ease-in-out infinite;
  }

  @keyframes heartbeat {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    14% { transform: translate(-50%, -50%) scale(1.08); }
    28% { transform: translate(-50%, -50%) scale(1); }
    42% { transform: translate(-50%, -50%) scale(1.08); }
    70% { transform: translate(-50%, -50%) scale(1); }
  }

  .wiggle-text {
    animation: wiggle 0.2s ease-in-out infinite;
  }

  @keyframes wiggle {
    0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
    25% { transform: translate(-50%, -50%) rotate(-3deg); }
    75% { transform: translate(-50%, -50%) rotate(3deg); }
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="scanlines"></div>
<div class="vhs-tracking"></div>
<div class="chromatic-aberration"></div>
<div class="red-pulse-overlay"></div>
<div class="distortion-wave"></div>
<div class="scream-flash" id="screamFlash"></div>
<div class="subliminal" id="subliminal"></div>

<div class="center-message heartbeat-text" id="centerMsg">
  เธอมาทำไม
</div>

<div class="countdown" id="countdown"></div>

<div class="hacking-screen" id="hackingScreen"></div>

<div class="webcam-fake" id="webcamFake">
  <div class="static-bg"></div>
  <div class="rec-dot"></div>
  <div class="webcam-text" id="webcamText">กำลังเข้าถึงกล้อง...</div>
</div>

<div class="ghost-face" id="ghostFace">☠</div>

<div class="bsod" id="bsod">
  <div class="sad">:(</div>
  <div class="msg">พีซีของคุณพบปัญหาที่ต้องรีสตาร์ท</div>
  <div class="detail">เราแค่รวบรวมข้อมูลข้อผิดพลาด แล้วจะรีสตาร์ทให้คุณ</div>
  <div class="detail" style="margin-top:10px;">สิ่งที่เกิดขึ้น: IT_KNOWS_YOU</div>
  <div class="percent" id="bsodPercent">0% เสร็จสิ้น</div>
</div>

<div class="warning-box" id="warningBox">
  <div class="warn-title">⚠ คำเตือน</div>
  <div class="warn-msg" id="warnMsg">ตรวจพบสิ่งผิดปกติ</div>
  <button class="warn-btn" id="warnBtn">ตกลง</button>
</div>

<canvas id="noiseCanvas" class="noise-overlay"></canvas>

<script>
const cursor = document.getElementById('cursor');
const centerMsg = document.getElementById('centerMsg');
const screamFlash = document.getElementById('screamFlash');
const subliminal = document.getElementById('subliminal');
const countdown = document.getElementById('countdown');
const hackingScreen = document.getElementById('hackingScreen');
const webcamFake = document.getElementById('webcamFake');
const webcamText = document.getElementById('webcamText');
const ghostFace = document.getElementById('ghostFace');
const bsod = document.getElementById('bsod');
const warningBox = document.getElementById('warningBox');
const warnMsg = document.getElementById('warnMsg');
const warnBtn = document.getElementById('warnBtn');
const noiseCanvas = document.getElementById('noiseCanvas');
const ctx = noiseCanvas.getContext('2d');

noiseCanvas.width = window.innerWidth;
noiseCanvas.height = window.innerHeight;

let mouseX = window.innerWidth / 2;
let mouseY = window.innerHeight / 2;
let trails = [];
let eyes = [];
let clickCount = 0;
let timeOnPage = 0;
let chaosLevel = 1;
let hasInteracted = false;
let userName = '';
let userLang = navigator.language || 'th';

const creepyTH = [
  'เธอมาทำไม', 'ออกไปเดี๋ยวนี้', 'มันมาแล้ว', 'อย่ามองหลัง', 'ช่วยด้วย',
  'เราติดอยู่ข้างใน', 'ปล่อยเราออกไป', 'เธอคนต่อไป', 'สวัสดี...เพื่อนใหม่',

// Audio
let audioCtx = null;

function initAudio() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch (e) {}
}

function playSound(type) {
  if (!audioCtx) return;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  switch (type) {
    case 'scream':
      osc.frequency.value = 200 + Math.random() * 800;
      osc.type = 'sawtooth';
      gain.gain.value = 0.15;
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
      osc.stop(audioCtx.currentTime + 0.8);
      break;
    case 'ghost':
      osc.frequency.value = 80 + Math.random() * 100;
      osc.type = 'sine';
      gain.gain.value = 0.1;
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
      osc.stop(audioCtx.currentTime + 1.5);
      break;
    case 'heartbeat':
      osc.frequency.value = 60;
      osc.type = 'sine';
      gain.gain.value = 0.2;
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      osc.stop(audioCtx.currentTime + 0.3);
      break;
    case 'static':
      const bufferSize = audioCtx.sampleRate * 0.5;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      const staticGain = audioCtx.createGain();
      staticGain.gain.value = 0.05;
      source.connect(staticGain);
      staticGain.connect(audioCtx.destination);
      source.start();
      return;
    case 'whisper':
      osc.frequency.value = 300 + Math.random() * 200;
      osc.type = 'triangle';
      gain.gain.value = 0.03;
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2);
      osc.stop(audioCtx.currentTime + 2);
      break;
    case 'knock':
      osc.frequency.value = 150;
      osc.type = 'square';
      gain.gain.value = 0.15;
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
      osc.stop(audioCtx.currentTime + 0.1);
      break;
  }
}

// BSOD
function triggerBSOD() {
  bsod.classList.add('active');
  let percent = 0;

  const interval = setInterval(() => {
    percent += Math.floor(Math.random() * 5);
    if (percent > 100) percent = 100;
    document.getElementById('bsodPercent').textContent = `${percent}% เสร็จสิ้น`;

    if (percent >= 100) {
      clearInterval(interval);
      setTimeout(() => {
        bsod.classList.remove('active');
        // Come back even worse
        chaosLevel = Math.min(chaosLevel + 2, 10);
        intensify();
      }, 2000);
    }
  }, 300);
}

// Intensify chaos
function intensify() {
  if (chaosLevel >= 5) {
    centerMsg.classList.add('wiggle-text');
  }

  if (chaosLevel >= 7) {
    document.body.classList.add('intense-mode');
  }

  if (chaosLevel >= 8) {
    // Random BSOD
    setTimeout(() => {
      if (Math.random() > 0.5) triggerBSOD();
    }, 10000 + Math.random() * 20000);
  }

  if (chaosLevel >= 9) {
    // Random hacking sequence
    setTimeout(() => {
      if (Math.random() > 0.6) triggerHackingSequence();
    }, 15000 + Math.random() * 25000);
  }
}

// Time-based escalation
setInterval(() => {
  timeOnPage++;

  // Every 30 seconds, increase chaos
  if (timeOnPage % 30 === 0 && chaosLevel < 10) {
    chaosLevel++;
    intensify();
  }

  // After 60 seconds, trigger hacking
  if (timeOnPage === 60) {
    triggerHackingSequence();
  }

  // After 120 seconds, BSOD
  if (timeOnPage === 120) {
    triggerBSOD();
  }

  // After 180 seconds, full chaos
  if (timeOnPage === 180) {
    chaosLevel = 10;
    intensify();
    setInterval(() => {
      triggerScream();
      flashGhostFace();
      flashSubliminal('⛧');
    }, 3000);
  }
}, 1000);
